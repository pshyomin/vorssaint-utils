name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build & publish DMG
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Set up signing
        env:
          SIGNING_CERT_P12: ${{ secrets.SIGNING_CERT_P12 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: ./Tools/ci-setup-signing.sh

      - name: Build
        run: ./build.sh

      - name: Selftest
        run: ./build/VorssaintUtils --selftest

      - name: Package DMG
        run: ./Tools/make-dmg.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.dmg
          generate_release_notes: true
